<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPLIANCE | CHUANIS</title>
    
    <link rel="stylesheet" href="assets/background.css">
    <link rel="stylesheet" href="assets/nav.css">
    
    <style>
        .contact-container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 20px;
            z-index: 10;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            text-align: left;
            backdrop-filter: blur(12px);
        }

        .label { color: #887dff; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; display: block; }
        .name { font-size: 36px; font-weight: 700; color: #fff; margin-bottom: 10px; }
        .role { font-size: 18px; color: #d2d0dd; margin-bottom: 40px; line-height: 1.5; border-left: 2px solid #887dff; padding-left: 20px; }

        .info-item { margin-bottom: 20px; }
        .info-label { font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .info-value { font-size: 16px; color: #fff; font-family: monospace; }
        
        .footer-note { margin-top: 50px; font-size: 12px; color: #444; text-align: center; }
    </style>
</head>
<body>

    <main class="contact-container">
        <div class="contact-card">
            <span class="label">Compliance & Inquiries</span>
            <h1 class="name">Lucas Y.C. Wang</h1>
            <p class="role">
                Independent Research Lab.<br>
                Architecting Extreme-Edge AI & Physical-Layer Safety Protocols.
            </p>

            <div class="info-item">
                <div class="info-label">Official Correspondence</div>
                <div class="info-value">lucas@chuanis.com</div>
            </div>

            <div class="info-item">
                <div class="info-label">Domain Authority</div>
                <div class="info-value">https://chuanis.com</div>
            </div>

            <div class="footer-note">
                © CHUANIS LABORATORIES. ALL RIGHTS RESERVED.
            </div>
        </div>
    </main>

    <script src="assets/background.js"></script>
    <script src="assets/nav.js"></script>
</body>
</html>
