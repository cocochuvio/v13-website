<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPLIANCE | CHUANIS</title>
    
    <link rel="stylesheet" href="assets/background.css">
    <link rel="stylesheet" href="assets/nav.css">
    
    <style>
        /* 核心修改：让联系页强制全屏居中，不产生滚动 */
        .contact-container {
            height: calc(100vh - 80px); /* 减去导航栏的高度 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* 禁止溢出滚动 */
            z-index: 10;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            max-width: 550px;
            width: 90%;
            text-align: left;
            backdrop-filter: blur(12px);
            margin-top: -50px; /* 轻微向上偏移，优化视觉重心 */
        }

        .label { color: #887dff; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .name { font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .role { font-size: 16px; color: #d2d0dd; margin-bottom: 30px; line-height: 1.5; border-left: 2px solid #887dff; padding-left: 15px; }

        .info-item { margin-bottom: 15px; }
        .info-label { font-size: 11px; color: #555; text-transform: uppercase; margin-bottom: 4px; }
        .info-value { font-size: 15px; color: #fff; font-family: monospace; }
        
        .footer-note { margin-top: 30px; font-size: 11px; color: #333; text-align: center; }
    </style>
</head>
<body>

    <main class="contact-container">
        <div class="contact-card">
            <span class="label">Compliance & Inquiries</span>
            <h1 class="name">Lucas Y.C. Wang</h1>
            <p class="role">
                Independent Research Lab.<br>
                Architecting Extreme-Edge AI & Physical-Layer Safety Protocols.
            </p>

            <div class="info-item">
                <div class="info-label">Official Correspondence</div>
                <div class="info-value">lucas@chuanis.com</div>
            </div>

            <div class="info-item">
                <div class="info-label">Domain Authority</div>
                <div class="info-value">https://chuanis.com</div>
            </div>

            <div class="footer-note">
                © CHUANIS LABORATORIES. ALL RIGHTS RESERVED.
            </div>
        </div>
    </main>

    <script src="assets/background.js"></script>
    <script src="assets/nav.js"></script>
</body>
</html>
