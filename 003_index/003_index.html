<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patent CN 122201305 A | Aegis Titan V13</title>
    
    <link rel="stylesheet" href="../001_background/001_global_bg.css">
    
    <link rel="stylesheet" href="../002_nav/002_nav.css">
    
    <style>
        /* =========================================
           003 INDEX 专属样式：只管自己的一亩三分地
           ========================================= */
        .index-hero {
            position: relative;
            text-align: center;
            padding-top: 150px;
            padding-bottom: 100px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* ✨ 专属电光紫环境光 */
        .ambient-core-light {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 800px; height: 500px;
            background: radial-gradient(circle, rgba(136, 125, 255, 0.25) 0%, rgba(10, 1, 24, 0) 70%);
            z-index: -1; 
            pointer-events: none;
            filter: blur(50px);
        }

        /* 📝 大字报排版 */
        .hero-title {
            font-size: 72px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.1;
            background: linear-gradient(180deg, #fff 20%, rgba(255, 255, 255, 0.6) 100%);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            z-index: 10;
        }
        .hero-desc {
            font-size: 20px;
            color: #d2d0dd;
            max-width: 800px;
            line-height: 1.6;
            margin-bottom: 50px;
            z-index: 10;
        }

        /* 🌐 终极进化：纯 CSS 3D 动态网格 (无需任何图片!) */
        .cyber-grid-container {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 50vh;
            perspective: 600px; /* 3D 透视镜头 */
            overflow: hidden;
            z-index: 0;
            /* 边缘羽化，让网格自然融入黑夜 */
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 90%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 90%);
        }
        .cyber-grid {
            position: absolute;
            width: 200%; height: 200%;
            bottom: -50%; left: -50%;
            /* 用数学画出紫色的网格线 */
            background-image: 
                linear-gradient(rgba(136, 125, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(136, 125, 255, 0.3) 1px, transparent 1px);
            background-size: 60px 60px;
            /* 倾斜网格并让它动起来 */
            transform: rotateX(75deg);
            animation: gridMove 2s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: rotateX(75deg) translateY(0); }
            100% { transform: rotateX(75deg) translateY(60px); } /* 60px 对应格子大小，实现无缝循环 */
        }

        /* 🔘 发光按钮 */
        .glowing-btn-wrapper {
            position: relative;
            padding: 2px;
            border-radius: 999px;
            background: conic-gradient(from 0deg, rgba(255,255,255,0.6) 0%, transparent 60%, rgba(255,255,255,0.6) 360%);
            animation: spin 4s linear infinite;
            z-index: 10;
        }
        .glowing-btn {
            background: #0a0118;
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            padding: 15px 40px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <main class="index-hero">
        <div class="ambient-core-light"></div>
        
        <div class="cyber-grid-container">
            <div class="cyber-grid"></div>
        </div>

        <h1 class="hero-title">Official Patent Archive<br>CN 122201305 A</h1>
        <p class="hero-desc">
            The ultimate on-device AI transcription architecture.<br>
            Engineered for absolute privacy with asynchronous dual-track processing and zero-network dependency.
        </p>
        
        <div class="glowing-btn-wrapper">
            <button class="glowing-btn">Explore Architecture</button>
        </div>
    </main>

    <script src="../001_background/001_global_bg.js"></script>
    
    <script src="../002_nav/002_nav.js"></script>

</body>
</html>
